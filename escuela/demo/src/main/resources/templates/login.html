<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Academia Roller Speed</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background-color: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            display: flex;
        }

        .login-image {
            background: url('https://images.unsplash.com/photo-1541818165691-86641ab3a9f0?q=80&w=2070&auto=format&fit=crop') center/cover;
            width: 50%;
            position: relative;
        }

        /* Overlay para oscurecer un poco la imagen y hacer el texto legible */
        .login-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(30, 41, 59, 0.2), rgba(30, 41, 59, 0.8));
        }

        .login-image-content {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            right: 2rem;
            z-index: 10;
            color: white;
        }

        .login-form-container {
            width: 50%;
            padding: 4rem 3rem;
            background: #ffffff;
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            color: #1e293b;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 2.5rem;
            letter-spacing: -1px;
        }

        .form-control {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 0.85rem 1.25rem;
            border-radius: 0.75rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .btn-login {
            background-color: #2563eb;
            color: white;
            font-weight: 600;
            padding: 0.85rem;
            border-radius: 0.75rem;
            border: none;
            width: 100%;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2);
        }

        .back-link {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #2563eb;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-card {
                flex-direction: column;
                margin: 1.5rem;
                max-width: 450px;
            }

            .login-image {
                width: 100%;
                height: 200px;
            }

            .login-form-container {
                width: 100%;
                padding: 2.5rem 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <!-- Imagen Izquierda -->
        <div class="login-image">
            <div class="login-image-content">
                <h3 class="fw-bold mb-2">Plataforma EduAdmin</h3>
                <p class="mb-0 opacity-75">Autogestión de horarios, pagos y progresos en un solo lugar.</p>
            </div>
        </div>

        <!-- Formulario Derecha -->
        <div class="login-form-container">
            <a href="/index" class="brand-logo">
                <i class="fa-solid fa-person-skating text-primary me-2"></i>Roller Speed
            </a>

            <h4 class="fw-bold text-dark mb-1">Bienvenido de vuelta</h4>
            <p class="text-secondary mb-4">Ingresa tus credenciales para acceder a tu panel.</p>

            <!-- Alerta Error -->
            <div th:if="${error}"
                class="alert alert-danger bg-danger text-white border-0 rounded-4 p-3 mb-4 d-flex align-items-center">
                <i class="fa-solid fa-circle-exclamation fs-5 me-3"></i>
                <div th:text="${error}"></div>
            </div>

            <!-- Alerta Logout -->
            <div th:if="${param.logout}"
                class="alert alert-success bg-success text-white border-0 rounded-4 p-3 mb-4 d-flex align-items-center">
                <i class="fa-solid fa-check-circle fs-5 me-3"></i>
                <div>Has cerrado sesión exitosamente.</div>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="email">Correo Electrónico / Identificación</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i
                                class="fa-solid fa-user"></i></span>
                        <input type="text" id="email" name="email" class="form-control border-start-0 ps-0"
                            placeholder="Ej. correo@ejemplo.com" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label mb-0" for="password">Contraseña</label>
                        <a href="#" class="text-primary text-decoration-none small fw-medium">¿Olvidaste tu
                            contraseña?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i
                                class="fa-solid fa-lock"></i></span>
                        <input type="password" id="password" name="password" class="form-control border-start-0 ps-0"
                            placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-login mb-4">
                    Iniciar Sesión <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                </button>

                <div class="text-center">
                    <a href="/index" class="back-link">
                        <i class="fa-solid fa-arrow-left me-2"></i> Volver a la página principal
                    </a>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
