<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Clase - Instructor</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            position: fixed;
            width: 250px;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            padding: 15px 20px;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #3b82f6;
            color: white;
            font-weight: bold;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .table-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="p-4 text-center border-bottom border-secondary mb-3">
            <i class="fa-solid fa-chalkboard-user fs-1 mb-2 text-success"></i>
            <h5 class="mb-0">Portal Docente</h5>
            <small class="text-muted" th:text="${correo}">instructor@email.com</small>
        </div>
        <a th:href="@{/panel/instructor}"><i class="fa-solid fa-house me-2"></i> Mi Resumen</a>
        <a th:href="@{/panel/instructor/mis-clases}" class="active"><i class="fa-solid fa-calendar-check me-2"></i> Mi
            Agenda</a>
        <a th:href="@{/panel/instructor/mis-clases}" class="active"><i class="fa-solid fa-users me-2"></i> Mis
            Alumnos</a>
        <a th:href="@{/panel/instructor/valoraciones}" class="active"><i class="fa-solid fa-star me-2"></i>
            Mis Valoraciones</a>
        <a th:href="@{/logout}" class="text-danger mt-5"><i class="fa-solid fa-right-from-bracket me-2"></i> Cerrar
            Sesión</a>
    </div>

    <div class="main-content">
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/panel/instructor}" class="btn btn-outline-secondary me-3"><i
                    class="fa-solid fa-arrow-left"></i>
                Volver</a>
            <h2 class="fw-bold mb-0">Gestión Académica: <span class="text-primary"
                    th:text="${clase.nombre}">Clase</span></h2>
        </div>

        <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i><span th:text="${mensajeExito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-2"></i><span th:text="${mensajeError}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="table-card border-start border-4 border-info">
                    <h5 class="fw-bold border-bottom pb-2 mb-4"><i
                            class="fa-solid fa-list-check text-info me-2"></i>Listado de Estudiantes</h5>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Alumno</th>
                                    <th>Contacto</th>
                                    <th class="text-center">Asistencia del Día</th>
                                    <th class="text-center">Reportar Nota / Evaluación</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="estudiante : ${estudiantes}">
                                    <td class="fw-bold text-dark" th:text="${estudiante.nombreCompleto}">Nombre</td>
                                    <td>
                                        <small class="d-block text-muted"
                                            th:text="${estudiante.correoElectronico}"></small>
                                        <small class="d-block text-muted" th:text="${estudiante.telefono}"></small>
                                    </td>

                                    <!-- Formulario rapido de Asistencia -->
                                    <td class="text-center">
                                        <form th:action="@{/panel/instructor/clases/{id}/asistencia(id=${clase.id})}"
                                            method="post"
                                            class="d-flex justify-content-center align-items-center gap-2">
                                            <input type="hidden" name="estudianteId" th:value="${estudiante.id}">
                                            <input type="date" name="fechaDef"
                                                class="form-control form-control-sm w-auto" required>
                                            <select name="presente" class="form-select form-select-sm w-auto">
                                                <option value="true">Presente</option>
                                                <option value="false">Falla</option>
                                            </select>
                                            <button type="submit" class="btn btn-sm btn-success"><i
                                                    class="fa-solid fa-check"></i></button>
                                        </form>
                                    </td>

                                    <!-- Formulario de Calificaciones -->
                                    <td class="text-center">
                                        <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal"
                                            th:data-bs-target="'#modalNota-' + ${estudiante.id}">
                                            <i class="fa-solid fa-star me-1"></i> Subir Nota
                                        </button>

                                        <!-- Modal para Notas -->
                                        <div class="modal fade" th:id="'modalNota-' + ${estudiante.id}" tabindex="-1">
                                            <div class="modal-dialog">
                                                <div class="modal-content text-start">
                                                    <div class="modal-header bg-primary text-white">
                                                        <h5 class="modal-title">Evaluar Estudiante</h5>
                                                        <button type="button" class="btn-close btn-close-white"
                                                            data-bs-dismiss="modal"></button>
                                                    </div>
                                                    <div class="modal-body">
                                                        <form
                                                            th:action="@{/panel/instructor/clases/{id}/notas(id=${clase.id})}"
                                                            method="post">
                                                            <input type="hidden" name="estudianteId"
                                                                th:value="${estudiante.id}">

                                                            <div class="mb-3">
                                                                <label class="form-label">Fecha de Evaluación</label>
                                                                <input type="date" name="fechaDef" class="form-control"
                                                                    required>
                                                            </div>
                                                            <div class="mb-3">
                                                                <label class="form-label">Calificación (0.0 a
                                                                    5.0)</label>
                                                                <input type="number" step="0.1" min="0" max="5"
                                                                    name="nota" class="form-control"
                                                                    placeholder="Ej. 4.5" required>
                                                            </div>
                                                            <div class="mb-3">
                                                                <label class="form-label">Observaciones / Logros</label>
                                                                <textarea name="observacion" class="form-control"
                                                                    rows="3"
                                                                    placeholder="Comentarios sobre el rendimiento..."
                                                                    required></textarea>
                                                            </div>
                                                            <div class="d-grid">
                                                                <button type="submit" class="btn btn-primary">Guardar
                                                                    Calificación</button>
                                                            </div>
                                                        </form>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${estudiantes.empty}">
                                    <td colspan="4" class="text-center py-4 text-muted fst-italic">Esta clase aún no
                                        tiene estudiantes inscritos.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script automático para rellenar la fecha de hoy en los inputs type="date" -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var today = new Date().toISOString().split('T')[0];
            var dateInputs = document.querySelectorAll('input[type="date"]');
            dateInputs.forEach(function (input) {
                if (!input.value) {
                    input.value = today;
                }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
