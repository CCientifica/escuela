<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - Alumno</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            position: fixed;
            width: 250px;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            padding: 15px 20px;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #3b82f6;
            color: white;
            font-weight: bold;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .form-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="p-4 text-center border-bottom border-secondary">
            <i class="fa-solid fa-user-graduate fs-1 mb-2 text-primary"></i>
            <h5 class="mb-0">Portal Alumno</h5>
            <small class="text-muted" th:text="${correo}">usuario@email.com</small>
        </div>
        <a th:href="@{/panel/estudiante}"><i class="fa-solid fa-house me-2"></i> Mi Resumen</a>
        <a th:href="@{/panel/estudiante/perfil}" class="active"><i class="fa-solid fa-user-pen me-2"></i> Mi Perfil</a>
        <a th:href="@{/panel/estudiante/horarios}"><i class="fa-solid fa-calendar-days me-2"></i> Mis Horarios</a>
        <a th:href="@{/panel/estudiante/progreso}"><i class="fa-solid fa-chart-line me-2"></i> Mi Progreso</a>
        <a th:href="@{/panel/estudiante/pagos}"><i class="fa-solid fa-wallet me-2"></i> Pagos y Facturación</a>
        <a th:href="@{/logout}" class="text-danger mt-5"><i class="fa-solid fa-right-from-bracket me-2"></i> Cerrar
            Sesión</a>
    </div>

    <div class="main-content">
        <h2 class="mb-4 fw-bold">Gestión de Perfil</h2>

        <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-check-circle me-2"></i><span th:text="${mensaje}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="form-card">
            <h5 class="fw-bold mb-4 border-bottom pb-2">Información Personal</h5>

            <form th:action="@{/panel/estudiante/perfil}" th:object="${estudiante}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Documento de Identidad (Solo Lectura)</label>
                        <input type="text" class="form-control bg-light" th:field="*{documentoIdentidad}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Correo Electrónico (Usuario Login) <span
                                class="text-danger">*</span></label>
                        <input type="email" class="form-control" th:field="*{correoElectronico}" required>
                        <small class="text-warning"><i class="fa-solid fa-triangle-exclamation"></i> Cambiar esto
                            modificará tu usuario de inicio de sesión.</small>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nombre Completo <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{nombreCompleto}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Fecha de Nacimiento <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" th:field="*{fechaNacimiento}" required>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Género</label>
                        <select class="form-select" th:field="*{genero}">
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Teléfono / Celular Principal <span
                                class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{telefono}" required>
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Contacto de Emergencia <span
                                class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{contactoEmergencia}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">EPS / Entidad de Salud</label>
                        <input type="text" class="form-control" th:field="*{eps}">
                    </div>
                </div>

                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary px-4 py-2 fw-bold shadow-sm">
                        <i class="fa-solid fa-save me-2"></i>Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
