<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nueva Matrícula</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 5rem;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Escuela App</a>
        </div>
    </nav>

    <main class="container">
        <h2>Registrar Matrícula</h2>
        <form th:action="@{/matriculas/guardar}" method="post">
            <div class="mb-3">
                <label for="estudianteId" class="form-label">Estudiante</label>
                <select class="form-select" id="estudianteId" name="estudianteId" required>
                    <option value="" disabled selected>Selecciona un estudiante...</option>
                    <option th:each="estudiante : ${estudiantes}" th:value="${estudiante.id}"
                        th:text="${estudiante.nombre}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label for="cursoId" class="form-label">Curso</label>
                <select class="form-select" id="cursoId" name="cursoId" required>
                    <option value="" disabled selected>Selecciona un curso...</option>
                    <option th:each="curso : ${cursos}" th:value="${curso.id}" th:text="${curso.nombre}"></option>
                </select>
            </div>

            <button type="submit" class="btn btn-info text-white">Matricular</button>
            <a href="/matriculas" class="btn btn-secondary">Cancelar</a>
        </form>
    </main>
</body>

</html>
