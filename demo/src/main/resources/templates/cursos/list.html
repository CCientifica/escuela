<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cursos - Escuela App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 5rem;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Escuela App</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="/estudiantes">Estudiantes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/cursos">Cursos</a></li>
                    <li class="nav-item"><a class="nav-link" href="/matriculas">Matrículas</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div
            class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Cursos</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
                <a href="/cursos/nuevo" class="btn btn-sm btn-outline-success">Nuevo Curso</a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-sm">
                <thead>
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Nombre</th>
                        <th scope="col">Descripción</th>
                        <th scope="col">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="curso : ${cursos}">
                        <td th:text="${curso.id}">1</td>
                        <td th:text="${curso.nombre}">Matemáticas 101</td>
                        <td th:text="${curso.descripcion}">Curso básico de matemáticas</td>
                        <td>
                            <a th:href="@{/cursos/eliminar/{id}(id=${curso.id})}" class="btn btn-sm btn-danger"
                                onclick="return confirm('¿Estás seguro de eliminar este curso?')">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>

</html>
